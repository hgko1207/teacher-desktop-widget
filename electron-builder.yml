appId: com.teacher-widget.app
productName: Teacher's Desk
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!plan.md'
  - '!research.md'
asarUnpack:
  - resources/**
  - node_modules/koffi/**
win:
  executableName: teacher-desk
  icon: resources/icon.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  artifactName: TeacherDesk-${version}-Setup.${ext}
  shortcutName: Teacher's Desk
  uninstallDisplayName: Teacher's Desk
  createDesktopShortcut: always
  createStartMenuShortcut: true
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages:
    - ko_KR
  language: 1042
portable:
  artifactName: TeacherDesk-${version}-Portable.${ext}
npmRebuild: false
publish:
  provider: github
  owner: hgko1207
  repo: teacher-desktop-widget
  releaseType: release
